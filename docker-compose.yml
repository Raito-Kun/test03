services:
  web:
    image: nginx:alpine
    container_name: web
    restart: unless-stopped
    volumes:
      - ./public:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
